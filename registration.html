<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный Кабинет - Virtual Beasts</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" href="assets/icon.svg">
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="assets/logo.svg" alt="" class="logo">
        </a>
        <nav class="nav">
            <a href="about.html" class="nav-link">о нас</a>
            <a href="research.html" class="nav-link">исследования</a>
            <a href="events.html" class="nav-link">события</a>
            <a href="pets.html" class="nav-link">наши питомцы</a>
            <a href="registration.html" class="nav-link">личный кабинет</a>
        </nav>
        <button class="burger" aria-label="menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <section class="registration-screen">
        <div class="registration-form">
            <div class="form-group">
                <label class="form-label">ИМЯ</label>
                <div class="input-wrapper">
                    <img src="assets/human.svg" alt="" class="input-icon">
                    <input type="text" class="form-input" placeholder="Введите ваше имя">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">ПОЧТА</label>
                <div class="input-wrapper">
                    <img src="assets/words.svg" alt="" class="input-icon">
                    <input type="email" class="form-input" placeholder="example@mail.ru">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">ПАРОЛЬ</label>
                <div class="input-wrapper">
                    <img src="assets/lock.svg" alt="" class="input-icon">
                    <input type="password" class="form-input" placeholder="Придумайте пароль">
                </div>
            </div>

            <button type="submit" class="btn btn-register">ЗАРЕГИСТРИРОВАТЬСЯ</button>

            <p class="form-footer">
                Уже есть аккаунт? <a href="login.html" class="link.login">Войти</a>
            </p>



        </div>
    </section>
    


    <script src="script.js"></script>
</body>
</html>
